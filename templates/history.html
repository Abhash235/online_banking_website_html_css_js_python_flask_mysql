{% extends "base.html" %}

{% block title %}Forgot Password — Online Bank{% endblock %}

{% block content %}
<style>
    .input-box input,
    textarea {
        width: 100%;
        padding: 12px;
        border: none;
        outline: none;
        border-radius: 6px;
        background: rgba(145, 200, 237, 0.521);
        color: white;
    }
   .table-container {
        overflow: auto;
        overflow-y: auto;
        width: fit-content;
        height: 470px;
        position: relative;
        margin: auto;
        padding: 15px;
        top: 19px;
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 200, 255, 0.5);
        margin-bottom: 65px;
        box-shadow:
            0 0 25px rgba(0, 200, 255, 0.3),
            inset 0 0 10px rgba(0, 200, 255, 0.2);
    }
    table {
        border-spacing: 15px 10px;
    }
</style>

<div class="table-container">

    <h2>Transaction History</h2>
    <table>
        <tr>
            <th>Sender</th>
            <th>Receiver</th>
            <th>Amount</th>
            <th>Remark</th>
            <th>Date</th>
        </tr>

        {% for row in data %}

        <tr>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>₹{{row[3]}}</td>
            <td>{{row[4]}}</td>
            <td>{{row[5]}}</td>
        </tr>

        {% endfor %}
</div>
</table>
{% endblock %}
